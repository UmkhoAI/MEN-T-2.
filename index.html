const modules = [
  {
    tag: "Module 1", time: "~4 min",
    title: "Software-Defined Mesh & Modern Architecture",
    subtitle: "How the control plane evolved — and why it matters for AI integration",
    content: `
<p>Before AI can manage a mesh network intelligently, the network must be architected in a way that makes it programmable. That starts with <strong>Software-Defined Networking (SDN)</strong> — the architectural shift that decoupled how networks are controlled from how they forward traffic.</p>

<h3>The Control Plane / Data Plane Split</h3>
<p>In traditional mesh networking, every node runs its own routing protocol locally. The node makes independent decisions based on locally available information. This is called <strong>distributed control</strong>. SDN challenges this model by pulling the intelligence out of individual nodes and centralising it in a <strong>controller</strong>.</p>
<div class="card-grid">
  <div class="card"><div class="card-title"><span class="dot"></span>Data Plane (stays distributed)</div><p>Each node still forwards packets at line speed based on rules pushed to it. Fast, hardware-accelerated. Nodes don't need to think — they just execute.</p></div>
  <div class="card"><div class="card-title"><span class="dot blue"></span>Control Plane (centralised)</div><p>A logically centralised controller has a global view of the entire network. It computes optimal routes, pushes flow rules to nodes, and can re-optimise the entire mesh in milliseconds.</p></div>
</div>

<p>The key protocol enabling this is <strong>OpenFlow</strong> — a standardised interface between controllers and network nodes. With OpenFlow, a controller can install, modify, or delete forwarding rules on any node in the mesh without touching the node's local software.</p>

<h3>Why SDN Matters for AI Integration</h3>
<p>SDN is the architectural prerequisite for AI-driven mesh management. With a centralised controller:</p>
<ul>
  <li>The controller has <strong>global telemetry</strong> — every link's traffic volume, error rate, latency, and channel utilisation in one place</li>
  <li>An AI model can be co-located with or integrated into the controller, consuming that telemetry and making network-wide optimisation decisions</li>
  <li>The controller can <strong>act on AI decisions instantly</strong> by pushing new flow rules — no need to wait for routing protocol convergence across the mesh</li>
  <li>The network becomes <strong>programmable</strong> — you can implement custom routing logic, QoS policies, or security rules as software, not as protocol specifications</li>
</ul>

<h3>Overlay vs Underlay Mesh</h3>
<p>Modern deployments often separate the physical mesh (underlay) from a logical mesh (overlay):</p>
<table class="data-table">
  <thead><tr><th></th><th>Underlay Mesh</th><th>Overlay Mesh</th></tr></thead>
  <tbody>
    <tr><td><strong>What it is</strong></td><td>Physical layer — actual radio links, cables, hardware routing</td><td>Virtual layer — tunnels (WireGuard, VXLAN, GRE) running on top of the underlay</td></tr>
    <tr><td><strong>Who manages it</strong></td><td>Physical mesh protocol (OLSR, batman-adv)</td><td>SDN controller or overlay routing daemon</td></tr>
    <tr><td><strong>Why separate them</strong></td><td colspan="2">Overlay changes (new routes, policies, segmentation) can be made without touching the physical hardware. AI can optimise the overlay independently of the underlay topology.</td></tr>
    <tr><td><strong>Examples</strong></td><td>Wi-Fi 802.11s mesh, LoRa mesh</td><td>WireGuard mesh VPN, Tailscale, VXLAN fabric</td></tr>
  </tbody>
</table>

<h3>Network Function Virtualisation (NFV) on Mesh Nodes</h3>
<p>NFV virtualises network functions (firewalls, load balancers, intrusion detection) so they run as software containers on commodity hardware instead of dedicated appliances. In a mesh context, this means a mesh relay node running on standard Linux hardware can also run a containerised firewall, a DNS resolver, or an AI inference engine — all on the same box.</p>

<div class="callout">
  <div class="callout-label">The convergence point</div>
  <p>SDN + NFV + Mesh creates the foundation for everything in this course. SDN gives you a programmable network with global visibility. NFV lets you deploy AI workloads onto mesh nodes themselves. Together, they transform a mesh network from a passive communication infrastructure into an <strong>active, intelligent distributed computing platform</strong>.</p>
</div>
`},

  {
    tag: "Module 2", time: "~6 min",
    title: "AI-Driven Network Optimisation",
    subtitle: "Machine learning for channel assignment, load balancing, and predictive maintenance",
    content: `
<p>A mesh network running at scale generates an extraordinary volume of telemetry: per-link signal strength, throughput, packet error rate, channel utilisation, client connection events, routing table changes, and more — continuously, from every node. This is precisely the kind of high-dimensional, time-series data that machine learning is built to handle.</p>

<h3>The Optimisation Problem</h3>
<p>Traditional mesh management relies on static thresholds and fixed rules: "if RSSI drops below −70dBm, switch channels." This works for average conditions but fails to anticipate problems, adapt to unusual traffic patterns, or optimise across multiple variables simultaneously. The real optimisation problem is multi-dimensional:</p>
<div class="card-grid-3">
  <div class="card"><div class="card-title"><span class="dot"></span>Channel Assignment</div><p>Which frequency channel should each node use to minimise interference while maximising throughput across all links simultaneously?</p></div>
  <div class="card"><div class="card-title"><span class="dot blue"></span>Load Balancing</div><p>Which node should serve a client that can hear multiple APs? Which path should a flow take through the mesh to avoid congestion?</p></div>
  <div class="card"><div class="card-title"><span class="dot teal"></span>Predictive Maintenance</div><p>Which node is likely to fail in the next 24 hours? Which link is degrading? Act before the failure, not after.</p></div>
</div>
<p>These three problems are deeply coupled — the optimal channel assignment changes the load distribution, which changes which paths are congested, which changes failure risk. No static rule set can solve this. ML can.</p>

<h3>ML for Dynamic Channel Assignment</h3>
<p>Channel assignment in dense mesh deployments is an instance of a <strong>graph colouring problem</strong> — assign channels (colours) to nodes/links such that adjacent nodes using the same channel are minimised. This is NP-hard to solve optimally at scale, making it a good target for approximate ML approaches.</p>

<h4>Approach 1 — Supervised Learning</h4>
<p>Collect labelled data: network configuration → observed throughput. Train a regression model to predict throughput for any proposed channel assignment. Use the model to search the assignment space and find configurations predicted to maximise throughput. Works well when historical data is rich and the environment is relatively stable.</p>

<h4>Approach 2 — Graph Neural Networks (GNNs)</h4>
<p>Represent the mesh as a graph. Each node's features include its current channel, traffic load, and interference measurements. Train a GNN to predict per-node throughput given the current graph configuration. The GNN naturally handles the structural relationships in the mesh topology — nearby nodes affect each other, and the GNN encodes this in its message-passing layers.</p>

<div class="callout info">
  <div class="callout-label">Real deployment: Cisco DNA Center</div>
  <p>Cisco's DNA Center uses ML-driven Radio Resource Management (RRM) that continuously analyses RF environment telemetry from all APs and recommends channel and power adjustments. It processes interference patterns, client density, and traffic loads simultaneously — something no manual configuration process can match at scale.</p>
</div>

<h3>ML for Client Steering and Load Balancing</h3>
<p>When a client can hear multiple mesh APs, the traditional approach uses simple RSSI thresholds to decide which AP it connects to. The problem: RSSI doesn't account for how loaded each AP is, what path quality looks like to the gateway, or whether a slightly weaker signal on a less-loaded AP would actually deliver better throughput.</p>

<p>An ML-based steering system collects features for each potential AP:</p>
<ul>
  <li>Current client count and traffic load</li>
  <li>Predicted path throughput to gateway (based on current mesh load)</li>
  <li>Historical performance for similar client devices on that AP</li>
  <li>Time of day and predicted near-term load</li>
</ul>
<p>A classification model or Q-network (covered in Module 3) then selects the optimal AP for each client — improving overall throughput and reducing congestion without any manual tuning.</p>

<h3>Predictive Maintenance with Time-Series ML</h3>
<p>Mesh node and link failures don't happen instantly — they degrade. A radio develops thermal issues and starts dropping packets intermittently. A physical connection corrodes and slowly loses signal strength. These degradation patterns are visible in telemetry long before the full failure, if you know what to look for.</p>

<h4>Anomaly Detection Pipeline</h4>
<div class="flow">
  <span class="flow-node green">Raw telemetry stream</span>
  <span class="flow-arrow">→</span>
  <span class="flow-node">Feature extraction</span>
  <span class="flow-arrow">→</span>
  <span class="flow-node">Baseline model</span>
  <span class="flow-arrow">→</span>
  <span class="flow-node hl">Anomaly score</span>
  <span class="flow-arrow">→</span>
  <span class="flow-node amber">Alert / pre-emptive reroute</span>
</div>

<p>Common ML approaches for mesh anomaly detection:</p>
<table class="data-table">
  <thead><tr><th>Method</th><th>How It Works</th><th>Best For</th></tr></thead>
  <tbody>
    <tr><td><strong>LSTM Autoencoder</strong></td><td>Learns to reconstruct normal telemetry sequences. High reconstruction error = anomaly.</td><td>Time-series telemetry with temporal dependencies</td></tr>
    <tr><td><strong>Isolation Forest</strong></td><td>Randomly partitions feature space; anomalies are isolated quickly (fewer partitions needed)</td><td>High-dimensional feature vectors, fast inference</td></tr>
    <tr><td><strong>One-Class SVM</strong></td><td>Learns a boundary around normal behaviour in feature space. Points outside = anomalies.</td><td>Low-dimensional features, small training sets</td></tr>
    <tr><td><strong>Transformer models</strong></td><td>Attention mechanism captures long-range dependencies in telemetry sequences. Emerging SOTA.</td><td>Large-scale deployments with rich historical data</td></tr>
  </tbody>
</table>

<div class="callout warn">
  <div class="callout-label">The false positive problem</div>
  <p>Anomaly detection in networks has high false positive rates if not carefully tuned. Every false positive triggers an investigation or re-route — wasted effort at scale. Calibrate your anomaly threshold with precision/recall trade-offs in mind. For most mesh deployments, a model that catches 80% of failures with &lt;5% false positives outperforms one that catches 95% of failures with 20% false positives.</p>
</div>
`},

  {
    tag: "Module 3", time: "~7 min",
    title: "Reinforcement Learning for Adaptive Routing",
    subtitle: "Teaching mesh nodes to make routing decisions by learning from experience",
    content: `
<p>The routing protocols covered in Part 1 (OLSR, AODV, Batman-adv) all use fixed metrics — hop count, link quality, airtime cost. These metrics are proxies for what we actually care about: <strong>delivering packets with minimum latency, maximum throughput, and minimum energy cost</strong>. Reinforcement learning offers a way to optimise directly for these real objectives, rather than proxy metrics.</p>

<h3>Why RL for Routing?</h3>
<p>Routing is a natural RL problem:</p>
<div class="card-grid">
  <div class="card"><div class="card-title"><span class="dot"></span>State</div><p>Current network conditions: queue lengths, link utilisation, error rates, topology. Partially observable — each node sees only its local neighbourhood.</p></div>
  <div class="card"><div class="card-title"><span class="dot blue"></span>Action</div><p>Which neighbour to forward this packet to. A discrete choice from the set of available next hops.</p></div>
  <div class="card"><div class="card-title"><span class="dot green"></span>Reward</div><p>Packet delivered successfully = positive reward. Packet dropped or delayed beyond threshold = negative reward. Delivery time can be encoded in reward magnitude.</p></div>
  <div class="card"><div class="card-title"><span class="dot purple"></span>Policy</div><p>The learned function that maps state → action. This is what the RL algorithm optimises over time.</p></div>
</div>

<h3>Q-Routing — The Founding Work</h3>
<p>In 1994, Justin Boyan and Michael Littman published <em>Packet Routing in Dynamically Changing Networks: A Reinforcement Learning Approach</em> — the paper that introduced <strong>Q-routing</strong>. It remains one of the cleanest demonstrations of RL applied to networking.</p>

<h4>The Q-Routing Algorithm</h4>
<p>Each node <code>x</code> maintains a Q-table: <code>Q(x, d, y)</code> represents the estimated time to deliver a packet destined for <code>d</code> if it is sent to neighbour <code>y</code> next.</p>

<div class="formula">Q(x, d, y) ← Q(x, d, y) + α × [t + Q(y, d, z*) − Q(x, d, y)]</div>
<p style="text-align:center; font-size:13px; color:var(--text3);">Where: t = transit time x→y, z* = y's best next hop for destination d, α = learning rate</p>

<p>When node <code>y</code> receives a packet and routes it onward, it sends a feedback signal back to <code>x</code> containing <code>Q(y, d, z*)</code>. Node <code>x</code> uses this to update its estimate. Over time, Q-values converge to accurate estimates of delivery time, and the routing policy converges to optimal paths.</p>

<p>Q-routing outperforms traditional shortest-path routing in dynamic, congested networks because it <strong>learns actual delivery times under load</strong>, not theoretical link capacities. A path with fewer hops but congested nodes may score worse than a longer path with free capacity.</p>

<h3>Deep Q-Network (DQN) Routing</h3>
<p>Classic Q-routing has a fundamental limitation: the Q-table grows linearly with the number of destinations. In a 1,000-node network, every node maintains a table with 1,000 entries per neighbour. Memory and computation become prohibitive.</p>

<p><strong>Deep Q-Network routing</strong> replaces the table with a neural network. Instead of storing <code>Q(x, d, y)</code> explicitly, a neural network takes the current state as input and outputs Q-values for all possible next-hop actions.</p>

<h4>State Representation</h4>
<p>The input to the DQN at each node typically includes:</p>
<ul>
  <li>Destination address (one-hot encoded or embedded)</li>
  <li>Queue lengths at each neighbour (normalised)</li>
  <li>Recent packet loss rates per neighbour link</li>
  <li>Recent latency observations per neighbour</li>
  <li>Current time of day (for periodicity patterns)</li>
</ul>

<h4>Training Considerations</h4>
<p>Training DQN routing in production is challenging. Key design decisions:</p>
<table class="data-table">
  <thead><tr><th>Challenge</th><th>Approach</th></tr></thead>
  <tbody>
    <tr><td>Experience collection without disrupting real traffic</td><td>Train on a network digital twin (simulation) first, then fine-tune online</td></tr>
    <tr><td>Exploration vs exploitation</td><td>ε-greedy with decaying ε: explore during low-traffic periods, exploit during peak hours</td></tr>
    <tr><td>Non-stationarity (other nodes are also learning)</td><td>Slow learning rates; periodic synchronisation between nodes' models</td></tr>
    <tr><td>Partial observability (can't see the full network)</td><td>Recurrent DQN (DRQN with LSTM) to encode historical observations</td></tr>
  </tbody>
</table>

<h3>Multi-Agent RL in Mesh Networks</h3>
<p>The most sophisticated approach treats the entire mesh as a <strong>Multi-Agent System (MAS)</strong>. Each node is an independent RL agent with its own policy. Agents must cooperate to achieve global objectives (e.g., minimise network-wide average latency) while only observing local state.</p>

<h4>Cooperative MARL Approaches</h4>
<div class="card-grid">
  <div class="card"><div class="card-title"><span class="dot"></span>Independent Q-Learning (IQL)</div><p>Each agent learns independently, treating other agents as part of the environment. Simple but suffers from non-stationarity — other agents changing their policy breaks convergence assumptions.</p></div>
  <div class="card"><div class="card-title"><span class="dot blue"></span>CTDE — Centralised Training, Decentralised Execution</div><p>During training, a central controller has access to all agents' observations and coordinates learning. At runtime, each agent acts independently using its local policy. QMIX and MAPPO use this paradigm.</p></div>
  <div class="card"><div class="card-title"><span class="dot purple"></span>Communication-based MARL</div><p>Agents share learned representations with neighbours before making decisions. CommNet, DIAL, and similar architectures let agents develop an emergent communication protocol to coordinate routing.</p></div>
  <div class="card"><div class="card-title"><span class="dot green"></span>Mean Field RL</div><p>Approximates the influence of all other agents with a mean field (average action). Dramatically reduces computational complexity for large mesh networks while maintaining cooperation.</p></div>
</div>

<div class="callout green">
  <div class="callout-label">Real-world validation</div>
  <p>Google's B4 WAN uses ML-based traffic engineering for its global backbone — a form of learned routing optimisation. DeepMind's work on data centre cooling (reducing energy by 40%) demonstrated that RL can solve complex, multi-variable optimisation problems in real networked systems. The same principles apply directly to mesh routing optimisation.</p>
</div>

<p>Federated Learning (FL) is one of the most compelling intersections of AI and mesh networking — not just because mesh enables FL, but because <strong>mesh topology fundamentally shapes how FL works and what it can achieve</strong>.</p>

<h3>What is Federated Learning?</h3>
<p>In traditional ML, you collect all your data in one place, train a model, and deploy it. This is impossible or undesirable when:</p>
<ul>
  <li>Data is private (medical records, financial transactions, personal device behaviour)</li>
  <li>Data is too large to move (satellite imagery, industrial sensor streams)</li>
  <li>Data must stay in a jurisdiction (GDPR, HIPAA compliance)</li>
  <li>Communication bandwidth is too limited to transmit raw data</li>
</ul>

<p>FL solves this by training where the data lives. Each participant trains locally and only shares <strong>model updates</strong> (gradients or weight deltas) — never raw data.</p>

<h3>The FedAvg Algorithm</h3>
<p>The canonical FL algorithm, FedAvg (McMahan et al., 2017), works as follows:</p>
<div class="flow"><span class="flow-node hl">Global model</span><span class="flow-arrow">→</span><span class="flow-node">Push to selected nodes</span><span class="flow-arrow">→</span><span class="flow-node green">Local training (k steps)</span><span class="flow-arrow">→</span><span class="flow-node">Send ΔW back</span><span class="flow-arrow">→</span><span class="flow-node hl">Aggregate → new global model</span></div>

<div class="formula">W_global ← Σ (n_i / N) × W_i</div>
<p style="text-align:center; font-size:13px; color:var(--text3);">Weighted average of local model weights, weighted by each node's data proportion</p>

<p>In a <strong>star-topology FL</strong> (classic setup), a central server coordinates all of this. But mesh networking enables something more powerful: <strong>decentralised federated learning</strong>, where aggregation itself is distributed across the mesh.</p>

<h3>Gossip-Based Model Aggregation</h3>
<p>In gossip-based FL, there is no central aggregation server. Instead, nodes <strong>periodically exchange model updates with their mesh neighbours</strong> and merge them locally. Over time, through many rounds of local gossip, the model converges to the same result as centralised aggregation — but without any single point of failure or bottleneck.</p>

<h4>How Gossip Aggregation Works</h4>
<ul>
  <li>Each node i trains locally for k steps, producing local weights <code>W_i</code></li>
  <li>Node i selects a neighbour j uniformly at random</li>
  <li>They exchange weights and both compute: <code>W_new = (W_i + W_j) / 2</code></li>
  <li>This "push-sum" gossip is repeated across the mesh until convergence</li>
</ul>

<p>The convergence rate depends on the <strong>spectral gap</strong> of the network graph — essentially, how well-connected the mesh is. A denser mesh converges faster; a sparse linear chain converges slowly. This directly ties mesh topology design to FL performance.</p>

<div class="callout">
  <div class="callout-label">Why this matters for mesh design</div>
  <p>If you're deploying federated learning on a mesh, topology optimisation is not just a networking problem — it's an AI performance problem. A mesh with poor connectivity (high diameter, low clustering) will have slow FL convergence. Designing the mesh backbone for gossip efficiency may require different decisions than designing purely for throughput.</p>
</div>

<h3>Critical Challenges in Mesh-Based FL</h3>

<h4>Non-IID Data Distribution</h4>
<p>In most real-world mesh deployments, different nodes see fundamentally different data. A traffic sensor in a business district has different patterns than one in a residential neighbourhood. A hospital ward's devices generate different data than a GP clinic's. This <strong>non-IID (non-Independent and Identically Distributed)</strong> data causes FedAvg to converge slowly or to a suboptimal model. Solutions include:</p>
<ul>
  <li><strong>FedProx</strong>: adds a proximal term that penalises local models for drifting too far from the global model</li>
  <li><strong>SCAFFOLD</strong>: uses control variates to correct for client drift caused by heterogeneous data</li>
  <li><strong>Clustered FL</strong>: groups nodes with similar data distributions and trains cluster-specific models</li>
</ul>

<h4>Byzantine-Robust Aggregation</h4>
<p>In a mesh network, some nodes may be compromised, malfunctioning, or actively malicious. A single Byzantine node can corrupt the global model by sending crafted gradient updates. Byzantine-robust aggregation rules include:</p>
<table class="data-table">
  <thead><tr><th>Method</th><th>How It Defends</th><th>Limitation</th></tr></thead>
  <tbody>
    <tr><td><strong>Krum</strong></td><td>Selects the update most similar to its n−f neighbours. Ignores statistical outliers.</td><td>High computation; performance drops with many Byzantines</td></tr>
    <tr><td><strong>Coordinate-wise Median</strong></td><td>Takes the median of each parameter across all updates. Resistant to extreme outliers.</td><td>Much slower convergence than mean aggregation</td></tr>
    <tr><td><strong>Clipping + Noise (DP-FL)</strong></td><td>Clips gradients to bound individual influence; adds calibrated noise for differential privacy</td><td>Reduces model accuracy; requires careful privacy budget management</td></tr>
  </tbody>
</table>

<h4>Communication Overhead</h4>
<p>Sending full model weights across a mesh is expensive. A small neural network with 1M parameters at float32 precision requires <strong>4MB per update per node</strong>. In a 100-node mesh with limited backhaul, this is prohibitive. Compression techniques:</p>
<ul>
  <li><strong>Gradient sparsification</strong>: only transmit the top-k% of gradient values by magnitude</li>
  <li><strong>Quantisation</strong>: reduce float32 gradients to int8 — 4× compression with modest accuracy loss</li>
  <li><strong>Low-rank approximation</strong>: decompose weight matrices into lower-rank factors before transmission</li>
</ul>

<div class="callout info">
  <div class="callout-label">Real deployment: healthcare mesh FL</div>
  <p>Multiple hospital systems have piloted FL over mesh-connected imaging devices to train radiology AI models without sharing patient data across institutions. Each hospital's devices form a local mesh; the FL aggregation happens at a hospital gateway; inter-hospital aggregation uses a federated protocol that never moves raw scans. The resulting models outperform models trained at any single institution alone.</p>
</div>
`},

<p>Moving AI computation closer to where data is generated — onto the mesh nodes themselves — is one of the most active frontiers in both networking and AI. It's driven by a simple constraint: the bandwidth and latency of sending raw sensor data to a cloud or centralised server is often the bottleneck, not the inference computation itself.</p>

<h3>The Edge-Cloud Spectrum</h3>
<p>AI workloads don't have to be fully centralised or fully local. There's a spectrum:</p>
<div class="card-grid-3">
  <div class="card"><div class="card-title"><span class="dot red"></span>Cloud inference</div><p>Raw data sent to cloud. Highest latency (100ms+). Lowest edge hardware requirements. Fails when connectivity is lost.</p></div>
  <div class="card"><div class="card-title"><span class="dot amber"></span>Edge inference</div><p>Model runs on local mesh node or gateway. Latency &lt;10ms. Operates offline. Requires edge hardware with inference capability.</p></div>
  <div class="card"><div class="card-title"><span class="dot green"></span>Collaborative/split inference</div><p>Model split between edge and cloud (or between multiple mesh nodes). Optimised per layer based on compute and bandwidth constraints.</p></div>
</div>

<h3>Model Compression for Edge Nodes</h3>
<p>State-of-the-art AI models (LLMs, large vision models) are orders of magnitude too large for typical mesh node hardware. Getting AI onto edge nodes requires aggressive model compression:</p>

<h4>Quantisation</h4>
<p>Reduces the numerical precision of weights and activations. Standard training uses float32 (32-bit). Post-training quantisation (PTQ) can reduce to:</p>
<ul>
  <li><strong>float16 / bfloat16</strong>: 2× memory reduction, negligible accuracy loss</li>
  <li><strong>int8</strong>: 4× reduction, &lt;1% accuracy loss on most tasks</li>
  <li><strong>int4</strong>: 8× reduction, moderate accuracy loss — often acceptable for classification/detection tasks</li>
  <li><strong>Binary neural networks</strong>: 1-bit weights — extreme compression, significant accuracy loss, limited to specific architectures</li>
</ul>

<h4>Pruning</h4>
<p>Removes weights or entire neurons that contribute least to the output. Unstructured pruning (removing individual weights) can achieve 90%+ sparsity with &lt;5% accuracy loss on CNNs. Structured pruning (removing entire filters or attention heads) is more hardware-friendly as it directly reduces layer dimensions.</p>

<h4>Knowledge Distillation</h4>
<p>Trains a small "student" model to mimic the outputs of a large "teacher" model. The student learns not just from hard labels but from the teacher's full output probability distribution (soft targets) — a much richer training signal. This is how models like DistilBERT (40% smaller than BERT, 97% of its performance) are created.</p>

<h3>Split Inference Across Mesh Nodes</h3>
<p>Split inference partitions a neural network's layers between devices. The first N layers run on the edge node; the remaining layers run on a more powerful node or the cloud. Only the intermediate tensor (the output of layer N) is transmitted — which is often much smaller than the raw input data.</p>

<h4>Finding the Optimal Split Point</h4>
<p>The optimal split balances computation time on the edge against transmission time for the intermediate tensor. For a convolutional neural network processing video:</p>
<ul>
  <li>Splitting after early layers: small intermediate tensor, but early layers may not have compressed the input much</li>
  <li>Splitting after middle layers: larger intermediate tensor, but more edge computation reduces cloud load</li>

<p>There's a deeply interesting convergence happening in AI infrastructure: the interconnects that link GPUs and compute nodes in AI training clusters <strong>are mesh networks</strong>. Understanding this connection illuminates both how large AI models get trained and how mesh networking principles apply at the silicon level.</p>

<h3>The Distributed Training Problem</h3>
<p>Training a large neural network requires more memory and compute than any single device can provide. GPT-4 scale models require hundreds to thousands of GPUs working in parallel for weeks. To do this, gradients and activations must be continuously exchanged between GPUs — and the <strong>topology of the interconnect mesh</strong> determines how fast this exchange happens.</p>

<h3>GPU Interconnect as Mesh</h3>
<div class="card-grid">
  <div class="card"><div class="card-title"><span class="dot green"></span>NVLink / NVSwitch (NVIDIA)</div><p>High-speed point-to-point links between GPUs. NVSwitch creates a full mesh within a node (every GPU connected to every other). 900 GB/s bidirectional bandwidth per GPU in H100 NVLink4. This is literally a full mesh at the silicon level.</p></div>
  <div class="card"><div class="card-title"><span class="dot blue"></span>InfiniBand (NVIDIA Quantum-2)</div><p>The inter-node fabric. HDR InfiniBand (200 Gb/s) connects thousands of nodes in fat-tree or dragonfly topologies — both forms of partial mesh. 400G NDR is the current standard in frontier AI clusters.</p></div>
  <div class="card"><div class="card-title"><span class="dot amber"></span>RoCE (RDMA over Converged Ethernet)</div><p>Ethernet-based alternative to InfiniBand. Lower cost, more standard hardware. Used in hyperscaler GPU clusters where InfiniBand cost is prohibitive at scale.</td></div>
  <div class="card"><div class="card-title"><span class="dot purple"></span>Dragonfly+ Topology</div><p>Interconnect topology used in frontier supercomputers. Groups of nodes fully connected internally; groups connected to each other via dedicated inter-group links. A multi-level partial mesh optimised for all-to-all communication patterns.</p></div>
</div>

<h3>Ring All-Reduce — The Core Algorithm</h3>
<p>The most important collective communication operation in distributed training is <strong>All-Reduce</strong>: every GPU starts with a local gradient, and after All-Reduce completes, every GPU has the sum of all gradients. This is how gradient synchronisation across thousands of GPUs happens.</p>

<p>The dominant implementation is <strong>Ring All-Reduce</strong>, which maps naturally onto mesh topology:</p>

<div class="flow"><span class="flow-node">GPU 0</span><span class="flow-arrow">→</span><span class="flow-node">GPU 1</span><span class="flow-arrow">→</span><span class="flow-node">GPU 2</span><span class="flow-arrow">→</span><span class="flow-node">GPU 3</span><span class="flow-arrow">→</span><span class="flow-node">GPU 0 (wrap)</span></div>

<p>Each GPU simultaneously sends a chunk of its gradient to the next GPU in the ring and receives a chunk from the previous one. After N−1 steps, every GPU has accumulated the full sum of all gradients. The bandwidth efficiency is nearly perfect — every link is fully utilised at all times, and total data transmitted scales as <code>2(N−1)/N × data_size</code> regardless of cluster size.</p>

<h4>Why Topology Matters for Training Speed</h4>
<div class="formula">Training time ∝ Compute time + Communication time</div>
<p>As models get larger, communication time dominates. A cluster with faster all-reduce (better interconnect mesh) can train the same model faster even with identical GPUs. This is why NVIDIA's NVLink bandwidth improvements drive training throughput improvements that show up in benchmark numbers — it's a mesh networking problem disguised as a hardware problem.</p>

<h3>Parallelism Strategies and Their Mesh Requirements</h3>
<table class="data-table">
  <thead><tr><th>Parallelism Type</th><th>What Gets Split</th><th>Communication Pattern</th><th>Mesh Requirement</th></tr></thead>
  <tbody>
    <tr><td><strong>Data Parallel</strong></td><td>Different data batches on different GPUs; all GPUs have full model copy</td><td>All-Reduce of gradients after each batch</td><td>High-bandwidth all-to-all; Ring All-Reduce over mesh</td></tr>
    <tr><td><strong>Tensor Parallel</strong></td><td>Individual weight matrices split across GPUs</td><td>All-Reduce after every matrix multiply (very frequent)</td><td>Ultra-low latency, requires NVLink-class mesh (not inter-node)</td></tr>
    <tr><td><strong>Pipeline Parallel</strong></td><td>Different model layers on different GPUs</td><td>Point-to-point activation passing between stages</td><td>Linear bandwidth between pipeline stages; tolerates higher latency</td></tr>
    <tr><td><strong>3D/Hybrid Parallel</strong></td><td>All three above simultaneously</td><td>Mixed all-to-all and point-to-point</td><td>Requires hierarchical mesh: NVLink intra-node, InfiniBand inter-node</td></tr>
  </tbody>
</table>

<div class="callout">
  <div class="callout-label">The mesh engineering insight</div>
  <p>Choosing parallelism strategies for large model training is a mesh topology problem. Tensor parallelism requires the highest bandwidth per GPU pair — it must stay within a node's NVLink mesh. Pipeline parallelism tolerates the higher latency of inter-node InfiniBand. Data parallelism can use either but benefits most from high aggregate bandwidth. Training engineers are, in a very real sense, mesh network engineers.</p>
</div>

    content: `
<p>AI changes the security landscape of mesh networks in both directions: it gives attackers new capabilities to evade detection and exploit vulnerabilities, and it gives defenders new tools for real-time threat detection and autonomous response. Understanding both sides is essential.</p>

<h3>AI-Powered Attacks on Mesh Networks</h3>

<h4>Intelligent Black Hole Attacks</h4>
<p>Traditional black hole attacks drop all packets — easy to detect (the affected destination becomes unreachable). An AI-powered variant is far more sophisticated: the attacker trains a model to selectively drop packets based on traffic patterns, dropping only some flows, only during high-traffic periods, or only dropping packets that are less likely to be noticed by monitoring systems. This <strong>adaptive, stealthy dropping</strong> evades threshold-based detection while still disrupting specific traffic.</p>

<h4>AI-Driven Adaptive Jamming</h4>
<p>Traditional RF jamming broadcasts noise continuously — detectable and locatable. AI-driven smart jamming learns the mesh's communication patterns (when does it transmit? on which channels? with what duty cycle?) and jams with surgical precision: short bursts targeted at specific protocol control messages (routing updates, ACKs) during specific time windows. This disrupts routing convergence while minimising its own radio energy expenditure and making it harder to locate.</p>

<h4>Adversarial ML Attacks on Mesh AI Systems</h4>
<p>If a mesh uses ML-based intrusion detection (IDS), attackers can craft adversarial inputs designed to evade the model. By analysing the IDS model's decision boundary (through probing or model theft), an attacker can craft traffic patterns that look legitimate to the AI while still achieving their malicious objective.</p>

<div class="callout danger">
  <div class="callout-label">Model theft in mesh networks</div>
  <p>An attacker can probe a mesh network's AI-based routing or security system by sending crafted packets and observing responses. Over many queries, they can reconstruct a functional copy of the model (model theft via membership inference or model extraction). Once they have a copy, they can generate adversarial inputs offline — without ever triggering rate limits or anomaly detection on the live network.</p>
</div>

<h3>Poisoning Attacks in Federated Learning on Mesh</h3>
<p>If your mesh uses federated learning (Module 4), compromised nodes can submit poisoned model updates during aggregation. There are two variants:</p>
<div class="card-grid">
  <div class="card"><div class="card-title"><span class="dot red"></span>Untargeted poisoning</div><p>Malicious nodes submit random or inverted gradients, degrading the global model's accuracy for all tasks. Relatively easy to detect with robust aggregation (Byzantine-robust methods from Module 4).</p></div>
  <div class="card"><div class="card-title"><span class="dot red"></span>Backdoor attacks</div><p>Malicious nodes implant a specific trigger pattern: the global model performs normally on clean inputs but outputs attacker-chosen predictions when a specific input pattern is present. Hard to detect — the model still passes accuracy benchmarks on clean test data.</p></div>
</div>

<p>Defending against backdoors: <strong>FedInverse</strong> and <strong>Neural Cleanse</strong> detect backdoors by searching for minimal input perturbations that cause the model to predict a specific class. <strong>Certified robust aggregation</strong> (e.g., Flame) filters updates whose norm deviates significantly from the median — effective against many poisoning strategies.</p>

<h3>AI-Based Mesh Defence Systems</h3>

<h4>Behavioural Fingerprinting of Nodes</h4>
<p>Each mesh node has a characteristic "fingerprint" — its typical traffic patterns, routing behaviour, packet timing, and resource utilisation. An AI system trained on historical node behaviour can detect when a node starts acting anomalously: routing table changes inconsistent with its position, unusual traffic volumes, forwarding behaviour that doesn't match its claimed routing metric. This detects compromised or malfunctioning nodes faster than any threshold-based system.</p>

<h4>Graph Neural Network IDS</h4>
<p>The mesh network topology is a graph. Attack patterns (wormholes, Sybil attacks, routing loops) have characteristic signatures in the graph — unusual clustering, impossible link metrics, node degree distributions that don't match legitimate deployments. A GNN trained on both normal and attack-pattern graphs can classify incoming topology reports and flag suspicious configurations in real time.</p>

<h4>Autonomous Threat Response</h4>
<p>Combining RL (Module 3) with security creates systems that autonomously respond to detected threats:</p>
<ul>
  <li><strong>Automated node quarantine</strong>: when a node is flagged as compromised, the SDN controller (Module 1) pushes flow rules that isolate it from the mesh without human intervention</li>
  <li><strong>Dynamic re-routing</strong>: when an attack is detected on a specific path, AI reroutes critical flows away from the affected nodes within milliseconds</li>
  <li><strong>Honeypot insertion</strong>: AI inserts decoy nodes that appear to be high-value targets, capturing attack signatures from probing attackers</li>
</ul>

<div class="callout">
  <div class="callout-label">The defender's advantage</div>
  <p>Unlike traditional security, where attackers and defenders are asymmetric (the attacker only needs to succeed once), AI-based mesh defence operates continuously and improves over time. Each attack attempt — even successful ones — generates training data that makes the defence stronger. The key is ensuring that incident data actually feeds back into model retraining, not just into log files that no one reads.</p>
</div>
`},

  {
    tag: "Final Quiz", time: "~5 min",
    title: "Final Assessment — Part 2",
    subtitle: "10 questions on advanced mesh concepts and AI integration",
    isQuiz: true,
    questions: [
      { q: "In Software-Defined Networking applied to mesh, what is the primary advantage of separating the control plane from the data plane?", opts: ["It reduces the number of nodes needed in the mesh","A centralised controller gains global network visibility, enabling AI-driven optimisation decisions that can be instantly applied via flow rules","It eliminates the need for routing protocols like OLSR or AODV","It allows nodes to operate without any networking software"], correct: 1, explain: "SDN's control/data plane separation gives a centralised controller full network telemetry and the ability to push optimised forwarding rules instantly — the prerequisite for AI-driven mesh management." },
      { q: "A Graph Neural Network (GNN) is well-suited for mesh channel assignment optimisation because:", opts: ["GNNs are the fastest ML inference architecture and can run on mesh node hardware","GNNs naturally model the structural relationships between nodes — nearby nodes' channel assignments directly affect each other's interference","GNNs eliminate the need for manual channel planning entirely","GNNs can only work with graph-structured data, and mesh networks happen to be graphs"], correct: 1, explain: "GNNs use message-passing between connected nodes to capture local structural relationships. This is exactly the right inductive bias for channel assignment, where adjacent nodes interfere with each other and must be co-optimised." },
      { q: "In Q-Routing, the Q-value Q(x, d, y) represents:", opts: ["The signal strength of the link between x and y","The estimated total time to deliver a packet destined for d if forwarded from x to neighbour y","The number of hops remaining to destination d via neighbour y","The probability that the link x→y will fail in the next minute"], correct: 1, explain: "Q-values in Q-Routing encode the estimated delivery cost (time) for a specific destination via a specific next hop. Routing decisions are made by choosing the neighbour with the minimum Q-value for the packet's destination." },
      { q: "In federated learning, 'non-IID data' refers to:", opts: ["Data that has not been indexed or identified","Network data that uses non-IP addressing","Different nodes having fundamentally different data distributions, violating the assumption that all nodes' data is drawn from the same distribution","Data that cannot be used for supervised learning"], correct: 2, explain: "Non-IID (non-Independent and Identically Distributed) data is where different mesh nodes' local datasets reflect different underlying distributions. This causes FedAvg to converge slowly or to a suboptimal global model." },
      { q: "What is the key advantage of gossip-based model aggregation in federated learning over centralised aggregation?", opts: ["It converges faster than centralised aggregation in all cases","It eliminates any single point of failure — aggregation is distributed across mesh neighbours with no central coordinator","It requires less total data to be transmitted across the network","It provides stronger privacy guarantees than centralised aggregation"], correct: 1, explain: "Gossip-based FL distributes the aggregation across the mesh — each node exchanges updates with random neighbours and merges them locally. This eliminates the central server as a bottleneck and single point of failure." },
      { q: "In the context of distributed AI training, why does tensor parallelism require NVLink-class intra-node mesh rather than inter-node InfiniBand?", opts: ["InfiniBand doesn't support the communication protocols used by tensor parallelism","Tensor parallelism requires All-Reduce after every matrix multiply — extremely high frequency and low latency requirements that only intra-node NVLink bandwidth can satisfy","Tensor parallelism is only supported on NVIDIA hardware","InfiniBand cannot handle the data formats produced by tensor operations"], correct: 1, explain: "Tensor parallel All-Reduce operations happen after every forward and backward pass through each layer — potentially thousands of times per training step. The latency and bandwidth requirements can only be met by NVLink's intra-node full-mesh interconnect, not inter-node InfiniBand." },
      { q: "In V2X (Vehicle-to-Everything) mesh, what does 'cooperative perception' enable that a single vehicle's sensors cannot?", opts: ["Higher GPS accuracy than standalone positioning systems","The ability to see past visual obstructions by receiving and fusing sensor data from neighbouring vehicles over the mesh","Direct communication with traffic infrastructure without cellular connectivity","Longer range radar operation in adverse weather"], correct: 1, explain: "Cooperative perception allows vehicles to share their sensor data (camera, LiDAR, radar) over the V2X mesh. A vehicle can fuse its neighbours' views with its own, effectively seeing around occlusions caused by other vehicles or buildings." },
      { q: "A 'backdoor attack' on a federated learning system differs from 'untargeted poisoning' in that:", opts: ["Backdoor attacks require physical access to the target nodes; untargeted poisoning does not","Backdoor attacks implant a specific trigger — the model behaves normally on clean data but produces attacker-chosen outputs for inputs containing the trigger. Untargeted poisoning degrades overall accuracy.","Backdoor attacks only affect the security classification model; untargeted poisoning affects routing","Backdoor attacks are always detectable by standard accuracy benchmarks; untargeted poisoning is not"], correct: 1, explain: "Backdoor attacks are particularly dangerous because they are stealthy — the compromised global model still passes clean-data accuracy tests. The malicious behaviour only manifests when the trigger pattern is present in an input." },
      { q: "Ring All-Reduce achieves near-perfect bandwidth efficiency in distributed training because:", opts: ["It compresses gradients before transmission, reducing data volume","Every link in the ring is fully utilised simultaneously — GPUs are both sending and receiving different gradient chunks at all times, with no idle links","It reduces the number of gradient synchronisation steps required per training step","It allows GPUs to share parameters without sending full gradient tensors"], correct: 1, explain: "Ring All-Reduce sends different chunks of the gradient around the ring in parallel. Every link is active simultaneously — there are no idle periods or bottleneck points. Total bandwidth utilisation is (N−1)/N × available bandwidth, approaching 100% as N grows." },
      { q: "Behavioural fingerprinting of mesh nodes for intrusion detection works by:", opts: ["Installing digital certificates on every node that expire if the node is compromised","Training an AI model on each node's historical traffic patterns, routing behaviour, and resource utilisation to detect when a node starts acting anomalously","Physically inspecting each node's hardware on a regular schedule","Encrypting all inter-node traffic and flagging any unencrypted packets as malicious"], correct: 1, explain: "Each legitimate mesh node has a characteristic behavioural profile. AI-based fingerprinting learns this baseline and detects deviations — unusual routing table changes, atypical forwarding behaviour, inconsistent traffic volumes — that indicate compromise or malfunction, often before any traditional threshold alarm would trigger." }
    ]
  }
];

let current = 0;
let seen = new Set([0]);
let quizState = { answers: {}, locked: {} };

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '<div class="sidebar-section">Advanced Modules</div>';
  modules.forEach((m, i) => {
    const isDone = seen.has(i) && i !== current;
    const cls = i === current ? 'nav-item active' : (isDone ? 'nav-item done' : 'nav-item');
    html += `<div class="${cls}" onclick="goTo(${i})">
      <span class="nav-num">${String(i+1).padStart(2,'0')}</span>
      <span style="flex:1;line-height:1.3">${m.tag}: ${m.title.length > 24 ? m.title.substring(0,24)+'…' : m.title}</span>
      ${isDone ? '<span class="nav-check">✓</span>' : ''}
    </div>`;
  });
  sb.innerHTML = html;
}

function buildProgress() {
  const pct = Math.round((current / (modules.length - 1)) * 100);
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `${current + 1} / ${modules.length}`;
  document.getElementById('est-label').textContent = modules[current].time || '';
}

function renderQuiz(mod) {
  const allDone = mod.questions.every((_, i) => quizState.locked[i]);
  let html = `<div class="module-tag">📋 ${mod.tag}</div>
    <h2 class="module-title">${mod.title}</h2>
    <p class="module-subtitle">${mod.subtitle}</p>
    <hr class="divider">`;

  if (allDone) {
    const score = mod.questions.filter((q,i) => quizState.answers[i] === q.correct).length;
    const pct = Math.round((score / mod.questions.length) * 100);
    const msg = pct === 100 ? 'Outstanding — you understand the full AI + mesh stack.' : pct >= 80 ? 'Strong result — you have solid command of the advanced material.' : pct >= 60 ? 'Good foundation. A few concepts worth revisiting.' : 'Some significant gaps — revisit Modules 3, 4, and 8 especially.';
    html += `<div class="score-screen">
      <div class="score-big">${score}/${mod.questions.length}</div>
      <div class="score-sub">${pct}% — ${msg}</div>
      <div class="cert">
        <div class="cert-title">Certificate of Completion — Part 2</div>
        <div class="cert-name">Mesh Networks + AI — Advanced</div>
        <div class="cert-desc">SDN · RL Routing · Federated Learning · Edge AI<br>Distributed Training · Security · Real-World Deployments</div>
        <div class="cert-badge">✦ Completed ${new Date().toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'})}</div>
      </div>
      <button class="btn" onclick="resetQuiz()" style="margin:0 auto;display:flex;">↺ Retake quiz</button>
    </div>`;
    mod.questions.forEach((q, qi) => {
      const isRight = quizState.answers[qi] === q.correct;
      html += `<div style="margin:1rem 0;padding:1rem;background:var(--bg3);border:1px solid var(--border);border-radius:8px;border-left:3px solid ${isRight ? 'var(--green)' : 'var(--red)'};">
        <div style="font-size:12px;font-family:var(--mono);color:var(--text3);margin-bottom:4px;">Q${qi+1} — ${isRight ? '✓ Correct' : '✗ Incorrect'}</div>
        <div style="font-size:14px;color:var(--text);margin-bottom:4px;">${q.q}</div>
        <div style="font-size:13px;color:var(--text3);font-style:italic;">${q.explain}</div>
      </div>`;
    });
  } else {
    const answered = Object.keys(quizState.locked).length;
    html += `<p style="color:var(--text3);font-size:13px;font-family:var(--mono);">${answered}/${mod.questions.length} answered</p>`;
    mod.questions.forEach((q, qi) => {
      html += `<div class="quiz-q"><span class="quiz-q-num">Question ${qi + 1} of ${mod.questions.length}</span>${q.q}</div><div class="quiz-opts">`;
      q.opts.forEach((opt, oi) => {
        const locked = !!quizState.locked[qi];
        const chosen = quizState.answers[qi] === oi;
        const cls = locked ? (oi === q.correct ? 'quiz-opt correct' : (chosen ? 'quiz-opt wrong' : 'quiz-opt')) : 'quiz-opt';
        html += `<button class="${cls}" ${locked ? 'disabled' : ''} onclick="answerQ(${qi},${oi})">${opt}</button>`;
      });
      html += `</div>`;
      if (quizState.locked[qi]) {
        const ok = quizState.answers[qi] === q.correct;
        html += `<div class="quiz-feedback">${ok ? '✓' : '✗'} ${q.explain}</div>`;
      } else {
        html += `<div class="quiz-feedback"></div>`;
      }
      if (qi < mod.questions.length - 1) html += '<hr class="divider">';
    });
  }
  return html;
}

function render() {
  const mod = modules[current];
  let html;
  if (mod.isQuiz) {
    html = renderQuiz(mod);
  } else {
    html = `<div class="module-tag">⬡ ${mod.tag} <span style="color:var(--text3);font-size:10px;">· ${mod.time}</span></div>
      <h2 class="module-title">${mod.title}</h2>
      <p class="module-subtitle">${mod.subtitle}</p>
      <hr class="divider">
      ${mod.content}`;
  }
  const prevDis = current === 0 ? 'disabled' : '';
  html += `<div class="nav-row">
    <button class="btn" ${prevDis} onclick="go(-1)">← Back</button>
    <span class="module-counter">${current + 1} / ${modules.length}</span>
    ${current < modules.length - 1 ? `<button class="btn primary" onclick="go(1)">Next: ${modules[current+1].tag} →</button>` : '<span></span>'}
  </div>`;

  document.getElementById('main').innerHTML = html;
  window.scrollTo(0, 0);
  buildSidebar();
  buildProgress();
}

function go(dir) { goTo(current + dir); }
function goTo(i) {
  if (i < 0 || i >= modules.length) return;
  current = i;
  seen.add(i);
  render();
}
function answerQ(qi, oi) {
  if (quizState.locked[qi]) return;
  quizState.answers[qi] = oi;
  quizState.locked[qi] = true;
  render();
}
function resetQuiz() {
  quizState = { answers: {}, locked: {} };
  render();
}

render();
</script>
</body>
</html>
